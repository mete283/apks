<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy_Display_base.apk İndir</title>
    <style>
        /* Animasyonlu Renkli Arka Plan */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cam Efekti (Glassmorphism) */
        .container {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* Arka planı bulanıklaştırır */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        /* Neon Efektli Buton */
        .download-btn {
            display: inline-block;
            padding: 18px 40px;
            background: #fff;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .download-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.6);
            background: #000;
            color: #fff;
        }

        .download-btn:active {
            transform: translateY(-2px);
        }

        /* Dekoratif Blur Yuvarlaklar */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(50px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="container">
        <h1>Privacy Display</h1>
        <p>Dosyanız güvenle indirilmeye hazır.</p>
        
        <a href="https://github.com/mete283/apks/raw/main/Privacy_Display_base.apk" download="Privacy_Display_base.apk" class="download-btn">
             ŞİMDİ İNDİR
        </a>
    </div>

</body>
</html>
